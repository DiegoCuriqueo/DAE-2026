<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | EduPay UCT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="ph ph-bank login-icon"></i>
                <h1>PAGOS UCT</h1>
                <p>Dirección de Finanzas UCT</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Usuario Institucional</label>
                    <input type="email" id="username" placeholder="Ingresar correo" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresar contraseña" required>
                </div>
                
                <div id="loginError" class="login-error" style="display: none;">
                    Credenciales incorrectas. Verifique su acceso.
                </div>
                
                <button type="submit" class="btn-primary btn-login">Ingresar</button>
            </form>

            <div class="login-footer">
                <p><i class="ph ph-lock-key"></i> Acceso restringido.</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
